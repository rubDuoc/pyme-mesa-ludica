<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14532d"/>
      <stop offset="0.55" stop-color="#16a34a"/>
      <stop offset="1" stop-color="#84cc16"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.30"/>
    </filter>
  </defs>
  <rect width="1200" height="500" fill="url(#bg)"/>
  <circle cx="1060" cy="100" r="160" fill="#ffffff" opacity="0.06"/>
  <circle cx="100" cy="420" r="150" fill="#ffffff" opacity="0.05"/>
  <!-- casa -->
  <g transform="translate(120,150)" filter="url(#sh)">
    <polygon points="120,0 250,110 -10,110" fill="#f59e0b"/>
    <rect x="20" y="110" width="200" height="150" fill="#ffffff"/>
    <rect x="95" y="170" width="55" height="90" fill="#92400e"/>
    <rect x="40" y="135" width="45" height="40" fill="#0ea5e9"/>
    <rect x="160" y="135" width="45" height="40" fill="#0ea5e9"/>
  </g>
  <!-- dado -->
  <g transform="translate(870,150) rotate(10)" filter="url(#sh)">
    <rect x="0" y="0" width="170" height="170" rx="26" fill="#ffffff"/>
    <g fill="#16a34a">
      <circle cx="45" cy="45" r="16"/><circle cx="125" cy="45" r="16"/>
      <circle cx="85" cy="85" r="16"/>
      <circle cx="45" cy="125" r="16"/><circle cx="125" cy="125" r="16"/>
    </g>
  </g>
  <!-- corazon -->
  <g transform="translate(560,70) scale(0.9)" filter="url(#sh)">
    <path d="M50 88 C20 64 6 50 6 32 C6 18 18 8 32 12 C40 14 47 22 50 28 C53 22 60 14 68 12 C82 8 94 18 94 32 C94 50 80 64 50 88 Z" fill="#ef4444"/>
  </g>
  <text x="600" y="420" font-family="Segoe UI, Arial, sans-serif" font-size="78" font-weight="800" fill="#ffffff" text-anchor="middle" filter="url(#sh)" letter-spacing="2">FAMILIARES</text>
</svg>
