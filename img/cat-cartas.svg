<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#92400e"/>
      <stop offset="0.55" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#000" flood-opacity="0.30"/>
    </filter>
  </defs>
  <rect width="1200" height="500" fill="url(#bg)"/>
  <circle cx="1050" cy="110" r="150" fill="#ffffff" opacity="0.07"/>
  <circle cx="120" cy="420" r="160" fill="#ffffff" opacity="0.06"/>
  <!-- naipes en abanico -->
  <!-- pica (negra) -->
  <g transform="translate(455,250) rotate(-22)" filter="url(#sh)">
    <rect x="-78" y="-112" width="156" height="224" rx="16" fill="#ffffff" stroke="#e5e7eb" stroke-width="3"/>
    <g transform="translate(0,-6)">
      <path d="M0 -52 C30 -28 44 -14 44 4 C44 18 32 28 18 24 C10 22 3 14 0 8 C-3 14 -10 22 -18 24 C-32 28 -44 18 -44 4 C-44 -14 -30 -28 0 -52 Z" fill="#111827"/>
      <polygon points="-12,18 12,18 22,48 -22,48" fill="#111827"/>
    </g>
    <text x="-58" y="-78" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#111827">A</text>
  </g>
  <!-- diamante (rojo) -->
  <g transform="translate(550,232) rotate(-8)" filter="url(#sh)">
    <rect x="-78" y="-112" width="156" height="224" rx="16" fill="#ffffff" stroke="#e5e7eb" stroke-width="3"/>
    <polygon points="0,-58 44,0 0,58 -44,0" fill="#dc2626"/>
    <text x="-58" y="-78" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#dc2626">A</text>
  </g>
  <!-- corazon (rojo) -->
  <g transform="translate(660,232) rotate(8)" filter="url(#sh)">
    <rect x="-78" y="-112" width="156" height="224" rx="16" fill="#ffffff" stroke="#e5e7eb" stroke-width="3"/>
    <path d="M0 46 C-30 22 -44 8 -44 -10 C-44 -24 -32 -34 -18 -30 C-10 -28 -3 -20 0 -14 C3 -20 10 -28 18 -30 C32 -34 44 -24 44 -10 C44 8 30 22 0 46 Z" fill="#dc2626"/>
    <text x="-58" y="-78" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#dc2626">A</text>
  </g>
  <!-- trebol (negro) -->
  <g transform="translate(755,250) rotate(22)" filter="url(#sh)">
    <rect x="-78" y="-112" width="156" height="224" rx="16" fill="#ffffff" stroke="#e5e7eb" stroke-width="3"/>
    <g transform="translate(0,-8)">
      <circle cx="0" cy="-20" r="22" fill="#111827"/>
      <circle cx="-22" cy="16" r="22" fill="#111827"/>
      <circle cx="22" cy="16" r="22" fill="#111827"/>
      <polygon points="-10,18 10,18 20,56 -20,56" fill="#111827"/>
    </g>
    <text x="-58" y="-78" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#111827">A</text>
  </g>
  <text x="600" y="450" font-family="Segoe UI, Arial, sans-serif" font-size="80" font-weight="800" fill="#ffffff" text-anchor="middle" filter="url(#sh)" letter-spacing="3">CARTAS</text>
</svg>
