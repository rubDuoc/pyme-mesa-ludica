<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1f4d"/>
      <stop offset="0.55" stop-color="#1e3a8a"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="500" fill="url(#bg)"/>
  <circle cx="1040" cy="90" r="150" fill="#ffffff" opacity="0.06"/>
  <circle cx="120" cy="430" r="180" fill="#ffffff" opacity="0.05"/>
  <!-- tablero de ajedrez -->
  <g transform="translate(70,250) rotate(-12)" opacity="0.9">
    <rect x="0" y="0" width="240" height="240" fill="#ffffff" opacity="0.10"/>
    <g fill="#ffffff" opacity="0.22">
      <rect x="0" y="0" width="60" height="60"/><rect x="120" y="0" width="60" height="60"/>
      <rect x="60" y="60" width="60" height="60"/><rect x="180" y="60" width="60" height="60"/>
      <rect x="0" y="120" width="60" height="60"/><rect x="120" y="120" width="60" height="60"/>
      <rect x="60" y="180" width="60" height="60"/><rect x="180" y="180" width="60" height="60"/>
    </g>
  </g>
  <!-- corona -->
  <g transform="translate(820,150)" filter="url(#sh)">
    <polygon points="0,150 0,40 60,90 130,10 200,90 260,40 260,150" fill="#fbbf24"/>
    <rect x="0" y="150" width="260" height="40" rx="6" fill="#f59e0b"/>
    <circle cx="0" cy="40" r="14" fill="#fde68a"/>
    <circle cx="130" cy="10" r="16" fill="#fde68a"/>
    <circle cx="260" cy="40" r="14" fill="#fde68a"/>
    <circle cx="70" cy="172" r="9" fill="#dc2626"/>
    <circle cx="130" cy="172" r="9" fill="#16a34a"/>
    <circle cx="190" cy="172" r="9" fill="#dc2626"/>
  </g>
  <text x="600" y="420" font-family="Segoe UI, Arial, sans-serif" font-size="78" font-weight="800" fill="#ffffff" text-anchor="middle" filter="url(#sh)" letter-spacing="2">ESTRATEGIA</text>
</svg>
